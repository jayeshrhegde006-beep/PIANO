<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Virtual Piano - Premium Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Antigravity <span>Piano</span></h1>
            <div class="controls">
                <div class="control-group">
                    <label>Instrument</label>
                    <select id="instrument-select">
                        <option value="piano">Acoustic Piano</option>
                        <option value="neon">Neon Synth</option>
                        <option value="organ">Hallowed Organ</option>
                        <option value="pad">Ethereal Pad</option>
                        <option value="electric">Electric Keys</option>
                        <option value="vintage">Vintage Lead</option>
                        <option value="cyber">Cyber Bass</option>
                        <option value="stardust">Star Dust</option>
                        <option value="toxic">Toxic Lead</option>
                        <option value="deepspace">Deep Space</option>
                        <option value="hero">8-Bit Hero</option>
                        <option value="bell">Dreamy Bell</option>
                        <option value="metal">Metal Grind</option>
                        <option value="hyper">Hyper Drive</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Octave</label>
                    <div class="octave-controls">
                        <button id="octave-down">-</button>
                        <span id="current-octave">C4</span>
                        <button id="octave-up">+</button>
                    </div>
                </div>
                <div class="control-group">
                    <label>Volume</label>
                    <input type="range" id="volume-slider" min="-60" max="0" value="-12">
                </div>
            </div>
        </header>

        <main>
            <div id="piano" class="piano-container">
                <!-- Keys will be generated by JavaScript -->
            </div>
        </main>

        <footer>
            <div class="shortcuts">
                <p><strong>Keyboard:</strong> Z-M (Oct 1) | Q-[ (Oct 2) | Space (Pedal)</p>
            </div>
            <div class="pedal-status">
                <span>Pedal:</span>
                <div id="pedal-indicator" class="indicator"></div>
            </div>
        </footer>
    </div>

    <!-- Interaction overlay for audio context activation -->
    <div id="start-overlay" class="overlay">
        <div class="overlay-content">
            <h2>Ready to Play?</h2>
            <p>Click anywhere to activate the audio engine</p>
            <button id="start-btn">Start Piano</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
